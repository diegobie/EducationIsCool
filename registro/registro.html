<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
    href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'
    rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../stylegeral.css">
    <title>Registre-se</title>
</head>
<body>
    <main class="container">
        <form>
            <h1>Cadastre-se</h1>
            <div class="input-box">
                <input placeholder="Nome" type="text">
                <i class='bx bx-user'></i>
            </div>
            <div  class="input-box">
                <input placeholder="Usuário" type="email">
                <i class="bx bxs-user"></i>
            </div>
            <div  class="input-box">
                <input placeholder="Aniversário" type="date">
                 
            </div>
            <div  class="input-box">
                <input placeholder="Senha" type="password" id="password">
                <i class="bx bxs-lock-alt" id="toggleIcon" onclick="togglePassword()" style="cursor: pointer;"></i>
            </div>
            <button type="submit" class="criar-conta"><a href="../login/login.html">Criar conta</a></button>
            <div class="login-link">
                <p>Já tem uma conta? <a href="../login/login.html">Fazer login</a></p>
            </div>
        </form>
    </main>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');

            if (passwordInput.type === 'password') {
                // Mostra a senha
                passwordInput.type = 'text';
                // Troca o ícone para um cadeado aberto ou olho (opcional)
                toggleIcon.classList.replace('bxs-lock-alt', 'bx-lock-open-alt');
            } else {
                // Esconde a senha
                passwordInput.type = 'password';
                // Volta para o ícone de cadeado fechado
                toggleIcon.classList.replace('bx-lock-open-alt', 'bxs-lock-alt');
            }
        }
    </script>
</body>
</html>
